<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sayfa Bulunamadı | GÜVEN Su Arıtma Sistemleri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Sitenin ana stilini de dahil edelim ki fontlar uyumlu olsun -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .logo {
            max-width: 180px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 80px;
            margin: 0;
            color: #007bff;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .btn-home {
            background-color: #007bff;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-home:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
        }
        .nk-footer {
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .nk-footer img {
            width: 80px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Logo yolunu düzelttik -->
    <img src="panel/uploads/settings_v/1280x720/guvensuaritma.png" alt="GÜVEN Su Arıtma Sistemleri" class="logo">
    
    <h1>404</h1>
    <h2>Eyvah! Filtrelerimize Takıldınız.</h2>
    <p>Aradığınız sayfa kurumuş veya yanlış bir yöne akmış olabilir. Merak etmeyin, ana kaynağa dönmek çok kolay!</p>
    
    <a href="/" class="btn-home">
        <i class="fas fa-home"></i> Ana Sayfaya Dön
    </a>

    <div class="nk-footer">
        <!-- NK Logo yolunu düzelttik -->
        <img src="resources/uploads/editor/nklogo.png" alt="Nurullah Kartal">
    </div>
</div>

</body>
</html>
